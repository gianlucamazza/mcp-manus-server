apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-manus-server
  namespace: mcp-manus
  labels:
    app.kubernetes.io/name: mcp-manus-server
    app.kubernetes.io/component: application
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: kubernetes
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-manus-server
      app.kubernetes.io/component: application
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-manus-server
        app.kubernetes.io/component: application
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
        co.elastic.logs/enabled: "true"
        co.elastic.logs/json.keys_under_root: "true"
        co.elastic.logs/json.add_error_key: "true"
    spec:
      serviceAccountName: mcp-manus-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mcp-manus-server
        image: mcp-manus-server:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        # Load configuration from ConfigMap
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: NODE_ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: LOG_LEVEL
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: PORT
        - name: HOST
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: HOST
        - name: BASE_URL
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: BASE_URL
        - name: RESOURCE_IDENTIFIER
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: RESOURCE_IDENTIFIER
        - name: OAUTH_REDIRECT_URI
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: OAUTH_REDIRECT_URI
        - name: OAUTH_AUTH_URL
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: OAUTH_AUTH_URL
        - name: OAUTH_TOKEN_URL
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: OAUTH_TOKEN_URL
        - name: OAUTH_SCOPES
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: OAUTH_SCOPES
        - name: MANUS_API_URL
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: MANUS_API_URL
        - name: BCRYPT_ROUNDS
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: BCRYPT_ROUNDS
        - name: METRICS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: METRICS_ENABLED
        - name: RATE_LIMIT_REQUESTS
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: RATE_LIMIT_REQUESTS
        - name: RATE_LIMIT_WINDOW_MS
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: RATE_LIMIT_WINDOW_MS
        - name: CORS_CREDENTIALS
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: CORS_CREDENTIALS
        - name: HSTS_MAX_AGE
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: HSTS_MAX_AGE
        - name: CSP_DIRECTIVES
          valueFrom:
            configMapKeyRef:
              name: mcp-manus-config
              key: CSP_DIRECTIVES
        # Load secrets from Secret
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: mcp-manus-secrets
              key: JWT_SECRET
        - name: OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: mcp-manus-secrets
              key: OAUTH_CLIENT_SECRET
        - name: OAUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: mcp-manus-secrets
              key: OAUTH_CLIENT_ID
        - name: MANUS_API_KEY
          valueFrom:
            secretKeyRef:
              name: mcp-manus-secrets
              key: MANUS_API_KEY
              optional: true
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mcp-manus-secrets
              key: DATABASE_URL
              optional: true
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: mcp-manus-secrets
              key: REDIS_URL
              optional: true
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: mcp-manus-secrets
              key: SENTRY_DSN
              optional: true
        # Kubernetes-specific environment variables
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: KUBERNETES_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: KUBERNETES_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /app/logs
        - name: cache
          mountPath: /app/.cache
      volumes:
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}
      - name: cache
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - mcp-manus-server
              topologyKey: kubernetes.io/hostname
      tolerations:
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      restartPolicy: Always

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-manus-server-staging
  namespace: mcp-manus
  labels:
    app.kubernetes.io/name: mcp-manus-server
    app.kubernetes.io/component: application
    app.kubernetes.io/version: "1.0.0"
    environment: staging
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-manus-server
      app.kubernetes.io/component: application
      environment: staging
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-manus-server
        app.kubernetes.io/component: application
        app.kubernetes.io/version: "1.0.0"
        environment: staging
    spec:
      serviceAccountName: mcp-manus-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: mcp-manus-server
        image: mcp-manus-server:staging
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: mcp-manus-config
        - configMapRef:
            name: mcp-manus-env-staging
        - secretRef:
            name: mcp-manus-secrets-staging
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}