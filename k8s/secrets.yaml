apiVersion: v1
kind: Secret
metadata:
  name: mcp-manus-secrets
  namespace: mcp-manus
  labels:
    app.kubernetes.io/name: mcp-manus-server
    app.kubernetes.io/component: secrets
    app.kubernetes.io/version: "1.0.0"
type: Opaque
stringData:
  # JWT Secret (replace with actual secret)
  JWT_SECRET: "REPLACE_WITH_ACTUAL_JWT_SECRET_MIN_32_CHARS"
  
  # OAuth Client Secret (replace with actual secret)
  OAUTH_CLIENT_SECRET: "REPLACE_WITH_ACTUAL_OAUTH_CLIENT_SECRET"
  
  # OAuth Client ID
  OAUTH_CLIENT_ID: "REPLACE_WITH_ACTUAL_OAUTH_CLIENT_ID"
  
  # Manus.im API Key (when available)
  MANUS_API_KEY: "REPLACE_WITH_ACTUAL_MANUS_API_KEY"
  
  # Database Configuration
  DATABASE_URL: "postgresql://username:password@postgres-service:5432/mcp_manus"
  DATABASE_PASSWORD: "REPLACE_WITH_ACTUAL_DB_PASSWORD"
  
  # Redis Configuration
  REDIS_URL: "redis://redis-service:6379"
  REDIS_PASSWORD: "REPLACE_WITH_ACTUAL_REDIS_PASSWORD"
  
  # External Services
  SENTRY_DSN: "REPLACE_WITH_ACTUAL_SENTRY_DSN"
  NEW_RELIC_LICENSE_KEY: "REPLACE_WITH_ACTUAL_NEW_RELIC_KEY"
  
  # Monitoring
  PROMETHEUS_ENDPOINT: "http://prometheus-service:9090"
  GRAFANA_ENDPOINT: "http://grafana-service:3000"
  
  # Backup Configuration
  BACKUP_S3_BUCKET: "mcp-manus-backups"
  BACKUP_S3_ACCESS_KEY: "REPLACE_WITH_S3_ACCESS_KEY"
  BACKUP_S3_SECRET_KEY: "REPLACE_WITH_S3_SECRET_KEY"

---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-manus-secrets-staging
  namespace: mcp-manus
  labels:
    app.kubernetes.io/name: mcp-manus-server
    app.kubernetes.io/component: secrets
    app.kubernetes.io/version: "1.0.0"
    environment: staging
type: Opaque
stringData:
  JWT_SECRET: "STAGING_JWT_SECRET_MIN_32_CHARS"
  OAUTH_CLIENT_SECRET: "STAGING_OAUTH_CLIENT_SECRET"
  OAUTH_CLIENT_ID: "STAGING_OAUTH_CLIENT_ID"
  MANUS_API_KEY: "STAGING_MANUS_API_KEY"
  DATABASE_URL: "postgresql://staging_user:staging_pass@postgres-staging:5432/mcp_manus_staging"
  REDIS_URL: "redis://redis-staging:6379"
  SENTRY_DSN: "STAGING_SENTRY_DSN"

---
