apiVersion: v1
kind: Service
metadata:
  name: mcp-manus-server
  namespace: mcp-manus
  labels:
    app.kubernetes.io/name: mcp-manus-server
    app.kubernetes.io/component: service
    app.kubernetes.io/version: "1.0.0"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  - name: metrics
    port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    app.kubernetes.io/name: mcp-manus-server
    app.kubernetes.io/component: application
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-manus-server-staging
  namespace: mcp-manus
  labels:
    app.kubernetes.io/name: mcp-manus-server
    app.kubernetes.io/component: service
    app.kubernetes.io/version: "1.0.0"
    environment: staging
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app.kubernetes.io/name: mcp-manus-server
    app.kubernetes.io/component: application
    environment: staging

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-manus-server-headless
  namespace: mcp-manus
  labels:
    app.kubernetes.io/name: mcp-manus-server
    app.kubernetes.io/component: service
    app.kubernetes.io/version: "1.0.0"
    service-type: headless
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    app.kubernetes.io/name: mcp-manus-server
    app.kubernetes.io/component: application