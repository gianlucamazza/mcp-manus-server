# Fluent Bit configuration for MCP Manus Server log aggregation
# Following 2025 best practices for structured logging

[SERVICE]
    Flush         1
    Log_Level     info
    Daemon        off
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    storage.path  /tmp/flb-storage/
    storage.sync  normal
    storage.checksum off
    storage.backlog.mem_limit 5M

# Input: MCP Server logs from files
[INPUT]
    Name              tail
    Path              /app/logs/*.log
    Parser            json
    Tag               mcp.server.*
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Buffer_Chunk_Size 32k
    Buffer_Max_Size   256k
    storage.type      filesystem

# Input: Container stdout logs
[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224
    Tag               mcp.container

# Filter: Add correlation context
[FILTER]
    Name    modify
    Match   mcp.*
    Add     cluster mcp-manus
    Add     service mcp-manus-server
    Add     version 1.0.0

# Filter: Parse correlation IDs for better indexing
[FILTER]
    Name           parser
    Match          mcp.*
    Key_Name       message
    Parser         correlation_parser
    Reserve_Data   On
    Preserve_Key   On

# Filter: Enrich with Kubernetes metadata (if applicable)
[FILTER]
    Name                kubernetes
    Match               mcp.container.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix     kube.var.log.containers.
    Merge_Log           On
    Merge_Log_Key       log_processed
    K8S-Logging.Parser  On
    K8S-Logging.Exclude Off

# Filter: Security event alerting
[FILTER]
    Name    grep
    Match   mcp.*
    Regex   eventType security

# Output: Send to Elasticsearch/OpenSearch
[OUTPUT]
    Name            es
    Match           mcp.*
    Host            ${ELASTICSEARCH_HOST}
    Port            ${ELASTICSEARCH_PORT}
    Index           mcp-logs
    Type            _doc
    Logstash_Format On
    Logstash_Prefix mcp-manus
    Logstash_DateFormat %Y.%m.%d
    Include_Tag_Key On
    Tag_Key         source
    Time_Key        @timestamp
    HTTP_User       ${ELASTICSEARCH_USER}
    HTTP_Passwd     ${ELASTICSEARCH_PASSWORD}
    tls             On
    tls.verify      On
    Retry_Limit     3
    storage.total_limit_size 5G

# Output: Send security events to dedicated index
[OUTPUT]
    Name            es
    Match_Regex     .*security.*
    Host            ${ELASTICSEARCH_HOST}
    Port            ${ELASTICSEARCH_PORT}
    Index           mcp-security-events
    Type            _doc
    Logstash_Format On
    Logstash_Prefix mcp-security
    Logstash_DateFormat %Y.%m.%d
    Include_Tag_Key On
    HTTP_User       ${ELASTICSEARCH_USER}
    HTTP_Passwd     ${ELASTICSEARCH_PASSWORD}
    tls             On
    tls.verify      On

# Output: Send to Prometheus for metrics (optional)
[OUTPUT]
    Name     prometheus_exporter
    Match    mcp.*
    Host     0.0.0.0
    Port     2021
    add_label app mcp-manus-server
    add_label env ${NODE_ENV}

# Output: Local backup (for debugging)
[OUTPUT]
    Name  file
    Match mcp.*
    Path  /tmp/
    File  mcp-backup.log
    Format json_lines